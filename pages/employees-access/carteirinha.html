<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senai ID</title>
    <!-- Stylesheets  -->
     <link rel="shortcut icon" href="../../img/senai_logo_quadrada.png" type="image/x-icon">
    <link rel="stylesheet" href="../employees-access/carteirinha.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

</head>

<body>
    <header>
        <div class="header-red-container">
            <a class="header-link" href="">Suporte</a>
            <a id="encerrar-sessao"><button onclick="encerrarSessao()">Encerrar sessão</button></a>
        </div>
        <div class="header-white-container">
            <button class="return-button"><i class='bx bx-left-arrow-alt'></i></button>
            <a href=""><img class="senai-logo" src="../../img/SENAI_logo_Azul.png"></a>
        </div>
    </header>
    
    <main>
        <div class="escurecer-tela"></div>
        <div class="carteirinha">
            <div class="top-inf">
                <img class="senai-logo"src="../../img/SENAI_logo_Azul.png">
                <h4>Escola Nami Jafet</h4>
                <img id="carteirinha-pfp" class="pfp" src="../../img/placeholder.jpg">
                <span>
                    <h3 id="cargo">Professor</h3>
                    <h4 id="nome">Bruno Messias Aguiar</h4>
                </span>
            </div>
            <div class="bottom-inf">
                <div class="info-collumn">
                    <div class="info-group">
                        <h5>CPF</h5>
                        <h4 id="cpf">123.456.789-00</h4>
                    </div>
                    <div class="info-group">
                        <h5>NIF</h5>
                        <h4 id="NIF">1234567</h4>
                    </div>
                </div>
                <div class="info-collumn">
                    <div class="info-group">
                        <h5>PIS</h5>
                        <h4 id="matricula">12345678900</h4>
                    </div>
                    <div class="info-group">
                        <img class="selo" src="../../img/Selo garantia Prof.svg" alt="">
                    </div>
                </div>
            </div>
        </div>
    </div>
<!---------------------------------Button to open the pop-up--------------------------------->
        <div class="acess">
            <button class="acess-id" type="submit" onclick="openPopup()">Acessar</button>
            
            <div class="popup" id="popup">
                <div class="close-access" onclick="closePopup()">
                    <i class='bx bx-x'></i>
                </div>

                <img src="/img/QrCode.png">
            </div>
        </div>
    </main>
    
    


    <script>
        // Função para abrir/fechar o menu no mobile
        function toggleMenu() {
            var menu = document.getElementById("mobileMenu");
            menu.classList.toggle("active");
        }

        // Funções para a abertura do acesso em forma de Popup
        let popup = document.getElementById('popup');
        let escurecer_tela = document.querySelector('.escurecer-tela');

        function openPopup() {
            popup.classList.add("open-popup");
            escurecer_tela.classList.add("active")
        }
        function closePopup() {
            popup.classList.remove("open-popup");
            escurecer_tela.classList.remove("active")
        }
        
    </script>   
    <script src="load_info.js"></script> 
</body>

</html>
